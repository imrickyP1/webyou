databases:
  - name: nexus-shop-db
    plan: free
    databaseName: nexus_shop
    user: nexus_user

services:
  - type: web
    name: nexus-shop-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.4"
      - key: DATABASE_URL
        fromDatabase:
          name: nexus-shop-db
          property: connectionString
