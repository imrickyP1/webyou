<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Nexus Shop</title>
    <meta name="description" content="Premium online shop with top tier products.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <nav class="glass-header">
        <div class="nav-container">
            <div class="logo" onclick="app.router.navigate('home')">
                <i class="fa-solid fa-gem"></i> NEXUS
            </div>
            <div class="nav-links">
                <a href="#" onclick="app.router.navigate('home')">Home</a>
                <a href="#" onclick="app.router.navigate('shop')">Shop</a>
                <a href="#" id="nav-admin" style="display: none;" onclick="app.router.navigate('admin')">Admin</a>
            </div>
            <div class="nav-actions">
                <button class="icon-btn" onclick="app.cart.toggleCart()">
                    <i class="fa-solid fa-shopping-cart"></i>
                    <span class="badge" id="cart-count">0</span>
                </button>
                <button class="btn primary-btn" id="nav-login-btn" onclick="app.auth.showAuthModal()">Login</button>
                <div class="user-menu" id="nav-user-menu" style="display: none;" onclick="app.router.navigate('account')">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=user" alt="Avatar" id="user-avatar" class="avatar-small">
                    <span id="nav-username">User</span>
                </div>
            </div>
        </div>
    </nav>

    <main id="app-content">
        <!-- Views will be injected here -->
    </main>

    <!-- Cart Sidebar -->
    <div class="cart-overlay" id="cart-overlay" onclick="app.cart.toggleCart()"></div>
    <div class="cart-sidebar glass-panel" id="cart-sidebar">
        <div class="cart-header">
            <h3>Your Cart</h3>
            <button class="icon-btn" onclick="app.cart.toggleCart()"><i class="fa-solid fa-times"></i></button>
        </div>
        <div class="cart-items" id="cart-items">
            <!-- Cart items go here -->
        </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Total:</span>
                <span id="cart-total-price">₱0.00</span>
            </div>
            <button class="btn btn-block gradient-btn" onclick="app.cart.checkout()">Checkout</button>
        </div>
    </div>

    <!-- Auth Modal -->
    <div class="modal-overlay" id="auth-modal">
        <div class="modal-content glass-panel bounce-in">
            <button class="modal-close" onclick="app.auth.closeAuthModal()"><i class="fa-solid fa-times"></i></button>
            <div class="auth-tabs">
                <button class="auth-tab active" onclick="app.auth.switchTab('login')">Login</button>
                <button class="auth-tab" onclick="app.auth.switchTab('register')">Register</button>
            </div>
            
            <form id="login-form">
                <div class="input-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="login-email" placeholder="Email" required>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="login-password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn btn-block gradient-btn">Login</button>
            </form>

            <form id="register-form" style="display:none;">
                <div class="input-group">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="reg-name" placeholder="Full Name" required>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="reg-email" placeholder="Email" required>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="reg-password" placeholder="Password" required>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-phone"></i>
                    <input type="tel" id="reg-contact" placeholder="Contact Number (e.g., 09123456789)">
                </div>
                <div class="input-group">
                    <i class="fa-brands fa-facebook-messenger"></i>
                    <input type="text" id="reg-messenger" placeholder="Messenger Account (optional)">
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-wallet"></i>
                    <input type="tel" id="reg-gcash" placeholder="GCash Number (optional)">
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="reg-is-admin">
                    <label for="reg-is-admin">Create as Admin User (Demo)</label>
                </div>
                <button type="submit" class="btn btn-block gradient-btn">Register</button>
            </form>
        </div>
    </div>

    <!-- View Templates (Hidden, used by JS) -->
    <template id="view-home">
        <section class="hero fade-in">
            <div class="hero-content">
                <h1 class="gradient-text">Discover Premium Digital Assets</h1>
                <p>Welcome to Nexus, the pinnacle of curated design resources and premium items.</p>
                <button class="btn gradient-btn pulse" onclick="app.router.navigate('shop')">Shop Now <i class="fa-solid fa-arrow-right"></i></button>
            </div>
            <div class="hero-shapes">
                <div class="shape shape-1"></div>
                <div class="shape shape-2"></div>
            </div>
        </section>
        <section class="featured fade-in" style="animation-delay: 0.2s">
            <div class="container">
                <h2 class="section-title">Featured Collections</h2>
                <div class="product-grid" id="featured-products"></div>
            </div>
        </section>
    </template>

    <template id="view-shop">
        <div class="container page-content fade-in">
            <div class="shop-layout">
                <aside class="shop-sidebar glass-panel">
                    <h3>Categories</h3>
                    <ul class="category-list" id="category-filter">
                        <li class="active" onclick="app.shop.filterCategory('All')">All Products</li>
                        <li onclick="app.shop.filterCategory('Electronics')">Electronics</li>
                        <li onclick="app.shop.filterCategory('Apparel')">Apparel</li>
                        <li onclick="app.shop.filterCategory('Digital')">Digital</li>
                    </ul>
                </aside>
                <div class="shop-main">
                    <div class="shop-header">
                        <h2>All Products</h2>
                        <div class="search-bar">
                            <i class="fa-solid fa-search"></i>
                            <input type="text" id="product-search" placeholder="Search products..." onkeyup="app.shop.searchProducts(this.value)">
                        </div>
                    </div>
                    <div class="product-grid" id="main-product-grid"></div>
                </div>
            </div>
        </div>
    </template>

    <template id="view-account">
        <div class="container page-content fade-in">
            <div class="account-header glass-panel">
                <div class="account-info">
                    <img src="" alt="Avatar" id="acc-avatar" class="avatar-large">
                    <div>
                        <h2 id="acc-name">User Name</h2>
                        <p id="acc-email">user@example.com</p>
                        <span class="badge" id="acc-role">Customer</span>
                    </div>
                </div>
                <button class="btn outline-btn" onclick="app.auth.logout()"><i class="fa-solid fa-sign-out-alt"></i> Logout</button>
            </div>

            <div class="account-body glass-panel mt-3">
                <h3>Order History</h3>
                <div class="table-responsive">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Order ID</th>
                                <th>Date</th>
                                <th>Items</th>
                                <th>Total</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="user-orders">
                            <!-- User orders injected here -->
                        </tbody>
                    </table>
                </div>
                <div id="no-orders-msg" style="display:none; text-align:center; padding: 2rem; color: var(--text-muted);">
                    You haven't placed any orders yet.
                </div>
            </div>
        </div>
    </template>

    <template id="view-admin">
        <div class="container page-content fade-in">
            <div class="admin-header">
                <h2><i class="fa-solid fa-shield-halved"></i> Admin Dashboard</h2>
                <div class="admin-tabs">
                    <button class="btn gradient-btn" onclick="app.admin.switchTab('products')">Products</button>
                    <button class="btn outline-btn" onclick="app.admin.switchTab('transactions')">Transactions</button>
                </div>
            </div>

            <div id="admin-products-view" class="admin-panel glass-panel mt-3">
                <div class="panel-header">
                    <h3>Product Management</h3>
                    <button class="btn primary-btn" onclick="app.admin.openProductModal()"><i class="fa-solid fa-plus"></i> Add Product</button>
                </div>
                <div class="table-responsive">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Image</th>
                                <th>Name</th>
                                <th>Category</th>
                                <th>Price</th>
                                <th>Stock</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="admin-product-list"></tbody>
                    </table>
                </div>
            </div>

            <div id="admin-transactions-view" class="admin-panel glass-panel mt-3" style="display:none;">
                <div class="panel-header">
                    <h3>All Orders & Customer Payments</h3>
                    <button class="btn primary-btn" onclick="app.admin.loadCustomers()"><i class="fa-solid fa-users"></i> View Customers</button>
                </div>
                <div class="table-responsive">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Order ID</th>
                                <th>Customer</th>
                                <th>Contact</th>
                                <th>Payment Method</th>
                                <th>Payment Info</th>
                                <th>Total</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="admin-transactions-list"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </template>

    <!-- Checkout Payment Modal -->
    <div class="modal-overlay" id="checkout-modal">
        <div class="modal-content glass-panel" style="max-width: 450px;">
            <button class="modal-close" onclick="app.cart.closeCheckoutModal()"><i class="fa-solid fa-times"></i></button>
            <h3>Complete Your Order</h3>
            <p style="margin-bottom: 1rem; color: var(--text-muted);">Choose your payment method</p>
            <form id="checkout-form" onsubmit="event.preventDefault(); app.cart.submitOrder();">
                <div class="input-group">
                    <i class="fa-solid fa-money-bill"></i>
                    <select id="payment-method" required onchange="app.cart.updatePaymentMethod()">
                        <option value="">Select Payment Method</option>
                        <option value="contact">Contact Number / Cash on Delivery</option>
                        <option value="gcash">GCash Payment</option>
                    </select>
                </div>
                <div class="input-group" id="payment-details-group" style="display:none;">
                    <i class="fa-solid fa-info-circle"></i>
                    <input type="text" id="payment-details" placeholder="Payment details">
                </div>
                <div style="background: var(--glass-bg); padding: 1rem; border-radius: 8px; margin-bottom: 1rem;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                        <span>Total Amount:</span>
                        <strong id="checkout-total">₱0.00</strong>
                    </div>
                    <p style="font-size: 0.85rem; color: var(--text-muted); margin: 0;">Order will be processed after admin approval</p>
                </div>
                <button type="submit" class="btn btn-block gradient-btn">Place Order</button>
            </form>
        </div>
    </div>

    <!-- Product Modal for Admin -->
    <div class="modal-overlay" id="product-modal">
        <div class="modal-content glass-panel" style="max-width: 500px;">
            <button class="modal-close" onclick="app.admin.closeProductModal()"><i class="fa-solid fa-times"></i></button>
            <h3 id="product-modal-title">Add New Product</h3>
            <form id="product-form" onsubmit="event.preventDefault(); app.admin.saveProduct();">
                <input type="hidden" id="prod-id">
                <div class="input-group">
                    <i class="fa-solid fa-box"></i>
                    <input type="text" id="prod-name" placeholder="Product Name" required>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-tag"></i>
                    <input type="number" step="0.01" id="prod-price" placeholder="Price" required>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-layer-group"></i>
                    <select id="prod-category" required>
                        <option value="Electronics">Electronics</option>
                        <option value="Apparel">Apparel</option>
                        <option value="Digital">Digital</option>
                    </select>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-image"></i>
                    <input type="text" id="prod-image" placeholder="Image URL (leave blank for default)">
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-boxes-stacked"></i>
                    <input type="number" id="prod-stock" placeholder="Stock Quantity" required>
                </div>
                <div class="input-group" style="align-items:flex-start">
                    <i class="fa-solid fa-align-left" style="margin-top:12px;"></i>
                    <textarea id="prod-desc" placeholder="Product Description" rows="3" required></textarea>
                </div>
                <button type="submit" class="btn btn-block gradient-btn">Save Product</button>
            </form>
        </div>
    </div>

    <!-- Notification Toast Container -->
    <div id="toast-container"></div>

    <script src="app.js?v=2"></script>
</body>
</html>
